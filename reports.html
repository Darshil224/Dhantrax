<!doctype html>
<html>
  <head>
    <title>Reports</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles/general.css" />
    <link rel="stylesheet" href="styles/dashboard.css" />
    <link rel="stylesheet" href="styles/header.css" />
    <link rel="stylesheet" href="styles/sidebar.css" />
    <link rel="stylesheet" href="styles/transactions.css" />
    <link rel="stylesheet" href="styles/budgets.css" />
    <link rel="stylesheet" href="styles/reports.css" />
  </head>
  <body>
    <div class="header">
      <div class="left-section">
        <div class="logo-container">
          <img
            class="logo"
            src="icons/wallet-solid-full.svg"
            alt="logo wallet"
          />
          <p>
            <span class="logo-text">Dhantrax</span> - Income and Expense Tracker
          </p>
        </div>
        <p class="tagline">Track Your Dhan, One Rupee at a Time.</p>
      </div>
      <div class="right-section">
        <img
          class="dark-mode-icon"
          src="icons/night-mode-svgrepo-com.svg"
          alt="dark mode"
        />
        <img
          class="settings-icon"
          src="icons/gear-solid-full.svg"
          alt="settings"
        />
      </div>
    </div>
    <div class="dashboard-container">
      <div class="sidebar">
        <div class="profile-container">
          <img
            class="profile-icon"
            src="icons/circle-user-solid-full.svg"
            alt="my-profile"
          />
          Welcome, John!
        </div>
        <div class="nav-options">
          <a href="dashboard.html" class="nav-option">
            <img
              src="icons/house-solid-full.svg"
              alt="dashboard icon"
            />Dashboard
          </a>
          <a href="transactions.html" class="nav-option">
            <img
              src="icons/transaction-14855 (1).svg"
              alt="transaction icon"
            />Transactions
          </a>
          <a href="budgets.html" class="nav-option">
            <img
              src="icons/chart-pie-solid-full.svg"
              alt="budget icon"
            />Budgets
          </a>
          <a href="reports.html" class="nav-option-active">
            <img
              src="icons/financial-report-14776.svg"
              alt="reports icon"
            />Reports
          </a>
          <a href="savings-goals.html" class="nav-option">
            <img
              src="icons/target-and-arrow-12218.svg"
              alt="savings goals icon"
            />Savings Goals
          </a>
        </div>
        <div class="export-link-container">
          <img
            class="export-icon"
            src="icons/export-arrow-14574.svg"
            alt="export icon"
          />
          <a href="#" class="export-link">Export Data</a>
        </div>
      </div>
      <div class="main-content">
        <div class="reports-header">
          <h2>Reports</h2>
          <div class="month-selector">
            <button>&lt;</button>
            <span>June 2023</span>
            <button>&gt;</button>
          </div>
        </div>
        <div class="report-chart-container">📊Chart will come here</div>
      </div>
    </div>
  </body>
</html>
